<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Makaranta — Confirmation</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root { --gold:#b8892a; --deep:#2c1a08; --muted:#7a6040; --success:#3d6b4a; --error:#8b2a2a; --parchment:#f5edd8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cormorant Garamond', Georgia, serif; background: var(--parchment); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .card { background: white; border-radius: 6px; box-shadow: 0 8px 40px rgba(26,18,9,.15); padding: 2.5rem; max-width: 440px; width: 100%; text-align: center; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #8b5e2a, #d4aa55, #8b5e2a); }
    .icon { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.2rem; font-size: 1.8rem; }
    .icon.success { background: linear-gradient(135deg, var(--success), #4a8a5a); }
    .icon.refused { background: linear-gradient(135deg, var(--error), #a03a3a); }
    h2 { font-family: 'Amiri', serif; font-size: 1.6rem; color: var(--deep); margin-bottom: .5rem; }
    p { color: var(--muted); font-size: 1rem; line-height: 1.6; margin-bottom: .5rem; }
    .status { font-size: .82rem; font-style: italic; color: #bbb; margin-top: 1.2rem; }
    .ornament { color: var(--gold); font-size: 1.2rem; margin: .8rem 0; }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="ornament">✦</div>
  <div class="icon" id="icon">⏳</div>
  <h2 id="title">Traitement en cours…</h2>
  <p id="message"></p>
  <p class="status" id="emailStatus"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  // Récupérer les paramètres de l'URL
  const params     = new URLSearchParams(window.location.search);
  const action     = params.get('action')     || '';
  const prenom     = params.get('prenom')     || '';
  const nom        = params.get('nom')        || '';
  const email      = params.get('email')      || '';
  const niveau     = params.get('niveau')     || '';
  const enseignant = params.get('enseignant') || '';
  const slot       = params.get('slot')       || '';

  const isConfirmed = action === 'confirme';

  // Mettre à jour l'interface
  const icon    = document.getElementById('icon');
  const title   = document.getElementById('title');
  const message = document.getElementById('message');

  icon.textContent    = isConfirmed ? '✓' : '✗';
  icon.className      = 'icon ' + (isConfirmed ? 'success' : 'refused');
  title.textContent   = isConfirmed ? 'Créneau validé !' : 'Demande refusée';
  message.innerHTML   = isConfirmed
    ? `Le créneau de <strong>${prenom} ${nom}</strong> a été confirmé.<br>Un email de confirmation lui a été envoyé.`
    : `La demande de <strong>${prenom} ${nom}</strong> a été refusée.<br>L'étudiant(e) en a été informé(e).`;

  // Envoyer l'email à l'étudiant via EmailJS
  emailjs.init('WixSITjIL4-G5Obzn');
  emailjs.send('service_jgm1nvl', 'template_e24ugve', {
    to_email: email,
    name:     `${prenom} ${nom}`,
    email:    email,
    niveau:   niveau,
    cours:    enseignant,
    horaire:  slot,
    statut:   isConfirmed ? 'confirmé' : 'refusé',
  }).then(() => {
    document.getElementById('emailStatus').textContent = '✓ Notification envoyée à l\'étudiant.';
  }).catch((err) => {
    console.error('EmailJS error:', err);
    document.getElementById('emailStatus').textContent = 'Erreur lors de l\'envoi de la notification.';
  });
</script>
</body>
</html>
